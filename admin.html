<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Bluebirds Gift House</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1008;--warm:#2d1a08;--mid:#6b4c2a;--light:#a8815a;
  --pale:#f5ede0;--cream:#fdf8f0;--gold:#c9973a;--gold2:#e8b84b;
  --accent:#b5451b;--green:#1a6b3a;--white:#fffef9;
  --border:1px solid rgba(201,151,58,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#ede5d8;color:var(--ink);min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--warm),#4a2d10)}
.login-box{background:var(--white);border-radius:24px;padding:46px 38px;width:min(400px,92vw);text-align:center;box-shadow:0 40px 80px rgba(0,0,0,.3)}
.login-icon{font-size:3rem;margin-bottom:14px}
.login-title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--warm);margin-bottom:5px}
.login-sub{font-size:.85rem;color:var(--mid);margin-bottom:24px}
.login-err{background:rgba(181,69,27,.1);border:1px solid rgba(181,69,27,.35);color:var(--accent);padding:10px 14px;border-radius:10px;font-size:.82rem;margin-bottom:12px;display:none}
.login-err.show{display:block}
.login-inp{width:100%;padding:12px 16px;border:var(--border);border-radius:12px;background:var(--pale);font-family:'DM Sans',sans-serif;font-size:.95rem;margin-bottom:12px;outline:none;transition:border-color .2s}
.login-inp:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#b8832a);color:white;border:none;border-radius:50px;font-weight:700;font-size:1rem;cursor:pointer;transition:all .3s}
.login-btn:hover{transform:translateY(-2px)}
.app{display:none;min-height:100vh}
.app.show{display:flex}
.sidebar{width:240px;background:var(--warm);color:white;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:100;overflow-y:auto;transition:transform .3s}
.sb-brand{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-icon{font-size:1.6rem}
.sb-name{font-family:'Playfair Display',serif;font-size:.9rem;color:rgba(253,248,240,.95);line-height:1.3}
.sb-sub{font-size:.66rem;color:rgba(253,248,240,.45);margin-top:2px}
.sb-nav{flex:1;padding:10px 0}
.sb-group{padding:6px 16px 2px;font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(253,248,240,.3);margin-top:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 16px;color:rgba(253,248,240,.7);cursor:pointer;transition:all .2s;font-size:.84rem;font-weight:500;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.08);color:white}
.nav-item.active{background:rgba(201,151,58,.2);color:var(--gold2);border-left-color:var(--gold)}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1)}
.sb-status{font-size:.73rem;color:rgba(253,248,240,.45);margin-bottom:7px}
.sb-logout{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(253,248,240,.7);padding:7px 12px;border-radius:50px;cursor:pointer;font-size:.77rem;width:100%;transition:all .2s}
.sb-logout:hover{background:rgba(255,255,255,.18);color:white}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:var(--border);padding:0 22px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:10px}
.topbar-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--warm)}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mob-toggle{display:none;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--warm)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;font-size:.74rem;font-weight:600;white-space:nowrap}
.chip-g{background:rgba(26,107,58,.1);border:1px solid rgba(26,107,58,.3);color:var(--green)}
.chip-y{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#b45309}
.chip-r{background:rgba(181,69,27,.1);border:1px solid rgba(181,69,27,.3);color:var(--accent)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.dot-spin{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.btn-prev{background:var(--pale);border:var(--border);color:var(--mid);padding:6px 13px;border-radius:50px;font-size:.79rem;cursor:pointer;text-decoration:none;transition:all .2s}
.btn-prev:hover{background:var(--warm);color:white}
.btn-pub{border:none;padding:8px 16px;border-radius:50px;font-weight:700;font-size:.84rem;cursor:pointer;background:linear-gradient(135deg,#1a6b3a,#0f4d28);color:white;transition:all .2s}
.btn-pub:hover{transform:translateY(-1px)}
.btn-pub:disabled{opacity:.6;cursor:not-allowed;transform:none}
.content{padding:22px;flex:1}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:13px;padding:16px;border:var(--border)}
.stat-icon{font-size:1.4rem;margin-bottom:6px}
.stat-num{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--warm)}
.stat-lbl{font-size:.73rem;color:var(--light);margin-top:2px}
.box{background:var(--white);border-radius:13px;border:var(--border);overflow:hidden;margin-bottom:18px;box-shadow:0 2px 8px rgba(26,16,8,.05)}
.box-head{padding:13px 16px;border-bottom:var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--pale)}
.box-title{font-family:'Playfair Display',serif;font-size:.92rem;color:var(--warm);font-weight:700}
.box-body{padding:16px}
.fl{display:block;font-size:.69rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.fi{width:100%;padding:9px 12px;border:var(--border);border-radius:9px;background:var(--pale);font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--ink);outline:none;transition:border-color .2s;margin-bottom:10px}
.fi:focus{border-color:var(--gold)}
textarea.fi{resize:vertical;min-height:64px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.btn-add{background:linear-gradient(135deg,var(--gold),#b8832a);color:white;border:none;padding:9px 18px;border-radius:50px;font-weight:700;font-size:.82rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
.btn-add:hover{transform:translateY(-1px)}
.btn-full{width:100%;padding:12px;border-radius:50px;font-weight:700;font-size:.86rem;cursor:pointer;border:none;background:linear-gradient(135deg,var(--warm),#4a2d10);color:white;transition:all .2s;margin-top:4px}
.btn-full:hover{transform:translateY(-1px)}
.btn-del{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:5px 11px;border-radius:50px;font-size:.72rem;cursor:pointer;transition:all .2s}
.btn-del:hover{background:var(--accent);color:white}
.btn-edit{background:transparent;border:var(--border);color:var(--mid);padding:5px 11px;border-radius:50px;font-size:.72rem;cursor:pointer;transition:all .2s}
.btn-edit:hover{background:var(--pale);border-color:var(--gold);color:var(--gold)}
.rows-list{display:flex;flex-direction:column;gap:8px}
.row-item{display:flex;align-items:center;gap:10px;padding:10px;border:var(--border);border-radius:9px;background:var(--cream);transition:all .2s}
.row-item:hover{border-color:var(--gold);background:var(--white)}
.row-thumb{width:46px;height:52px;border-radius:7px;overflow:hidden;background:var(--pale);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;border:var(--border)}
.row-thumb img{width:100%;height:100%;object-fit:cover}
.row-info{flex:1;min-width:0}
.row-name{font-weight:600;font-size:.84rem;color:var(--warm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-meta{font-size:.72rem;color:var(--light);margin-top:2px}
.row-actions{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap}
.alert{border-radius:11px;padding:13px;margin-bottom:13px;font-size:.82rem;line-height:1.7}
.alert-g{background:rgba(26,107,58,.06);border:1px solid rgba(26,107,58,.25);color:#0f4d28}
.alert-y{background:rgba(201,151,58,.08);border:var(--border);color:var(--mid)}
.alert-r{background:rgba(181,69,27,.06);border:1px solid rgba(181,69,27,.25);color:#7a2010}
.alert code{background:rgba(0,0,0,.07);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:.81rem}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:14px}
.quick-btn{background:var(--pale);border:var(--border);border-radius:11px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;width:100%}
.quick-btn:hover{background:var(--gold);color:white;transform:translateY(-2px)}
.quick-icon{font-size:1.6rem;margin-bottom:6px}
.quick-name{font-size:.81rem;font-weight:600}
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;padding:12px 16px;border-radius:11px;font-size:.85rem;font-weight:600;transform:translateY(80px);opacity:0;transition:all .4s;max-width:280px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#1a6b3a;color:white}
.toast.err{background:var(--accent);color:white}
.toast.info{background:var(--warm);color:white}
.color-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.swatch{width:42px;height:42px;border-radius:8px;border:var(--border);cursor:pointer;position:relative;overflow:hidden;flex-shrink:0}
.swatch input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.presets{display:flex;gap:6px;flex-wrap:wrap}
.preset{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s}
.preset:hover{transform:scale(1.15);border-color:var(--gold)}
.codebox{background:#1a1008;color:#86efac;border-radius:9px;padding:14px;font-family:monospace;font-size:.86rem;line-height:1.8;margin:9px 0;position:relative}
.codebox pre{white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;top:8px;right:8px;background:rgba(134,239,172,.15);border:1px solid rgba(134,239,172,.3);color:#86efac;padding:3px 9px;border-radius:5px;cursor:pointer;font-size:.73rem}
.copy-btn:hover{background:rgba(134,239,172,.3)}
.test-res{border-radius:11px;padding:13px;margin-top:11px;font-size:.87rem;font-weight:600;display:none}
.test-res.show{display:block}
.test-res.ok{background:#dcfce7;border:1px solid #86efac;color:#14532d}
.test-res.fail{background:#fef2f2;border:1px solid #fca5a5;color:#7f1d1d}
.btn-test{padding:11px 22px;border-radius:50px;font-weight:700;font-size:.88rem;cursor:pointer;border:none;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;transition:all .2s}
.btn-test:hover{transform:translateY(-2px)}
.font-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.font-card{border:2px solid var(--pale);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;text-align:center}
.font-card:hover,.font-card.active{border-color:var(--gold);background:rgba(201,151,58,.06)}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mob-toggle{display:block}
  .f2,.f3{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .topbar-right{gap:5px}
}
</style>
</head>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app = initializeApp({
  apiKey:"AIzaSyAHTHYZFIOdmYaZz0rVxjE8nQLUaqmJiUw",
  authDomain:"bluebirdsgifthouse-fcbef.firebaseapp.com",
  databaseURL:"https://bluebirdsgifthouse-fcbef-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"bluebirdsgifthouse-fcbef",
  storageBucket:"bluebirdsgifthouse-fcbef.firebasestorage.app",
  messagingSenderId:"641272713979",
  appId:"1:641272713979:web:bb91e0fe7f6ab5ce32165e"
});
const db = getDatabase(app);
window._fbSave = async function(data){
  try{ await set(ref(db,"storeData"),data); return {ok:true}; }
  catch(e){ return {ok:false,err:e.message}; }
};
window._fbTest = async function(){
  try{ await set(ref(db,"_test"),{ts:Date.now()}); return {ok:true}; }
  catch(e){ return {ok:false,err:e.message}; }
};
function setChipGlobal(s,t){
  var c=document.getElementById("fbChip");
  var tx=document.getElementById("fbChipTxt");
  var sb=document.getElementById("sbStatus");
  if(c) c.className="chip "+(s==="g"?"chip-g":s==="r"?"chip-r":"chip-y");
  if(tx) tx.textContent=t;
  if(sb) sb.textContent=t;
  if(c){ var dot=c.querySelector(".dot"); if(dot) dot.className="dot"+(s==="y"?" dot-spin":""); }
  window._fbStatus={s,t};
}
window._setFbChip = setChipGlobal;

var _fbTimer = setTimeout(function(){
  if(window._fbConnected === undefined){
    window._fbConnected = false;
    setChipGlobal("r","❌ Timeout — Check Rules");
    if(window._fbReadyCb) window._fbReadyCb();
  }
}, 10000);

get(ref(db,"storeData")).then(function(snap){
  clearTimeout(_fbTimer);
  var d = snap.val();
  if(d){ window.D = d; localStorage.setItem("bbgh_cache", JSON.stringify(d)); }
  window._fbConnected = true;
  setChipGlobal("g","✅ Connected");
  if(window._fbReadyCb) window._fbReadyCb();
}).catch(function(e){
  clearTimeout(_fbTimer);
  window._fbConnected = false;
  var msg = e.message||"";
  setChipGlobal("r", msg.includes("PERMISSION") ? "❌ Rules Blocked" : "❌ Failed");
  if(window._fbReadyCb) window._fbReadyCb();
});
</script>

var currentPage = "dash";

window.D = JSON.parse(localStorage.getItem("bbgh_cache") || "null") || DEFAULT_DATA;

window._fbReadyCb = function(){
  if(window._fbStatus && window._setFbChip) window._setFbChip(window._fbStatus.s, window._fbStatus.t);
  if(document.getElementById("appWrap").classList.contains("show")) renderPage(currentPage);
};

// ── LOGIN ──
document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("loginPwd").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });

function doLogin(){
  var pwd = document.getElementById("loginPwd").value;
  if(pwd === ADMIN_PWD){
    document.getElementById("loginWrap").style.display = "none";
    document.getElementById("appWrap").classList.add("show");
    if(window._fbStatus && window._setFbChip) window._setFbChip(window._fbStatus.s, window._fbStatus.t);
    renderPage("dash");
  } else {
    document.getElementById("loginErr").classList.add("show");
    document.getElementById("loginPwd").value = "";
    document.getElementById("loginPwd").focus();
  }
}

// ── PUBLISH ──
document.getElementById("publishBtn").addEventListener("click", doPublish);

async function doPublish(){
  var btn = document.getElementById("publishBtn");
  btn.disabled = true; btn.textContent = "⏳ Saving...";

  // Check data size — Firebase Realtime DB limit is ~10MB but practical limit with images is ~4MB
  var dataStr = JSON.stringify(window.D);
  var dataSizeKB = Math.round(dataStr.length / 1024);
  if(dataSizeKB > 4000){
    showToast("⚠️ Data too large ("+dataSizeKB+"KB). Remove some photos/videos first.","err");
    btn.disabled = false; btn.innerHTML = "☁️ Save &amp; Publish";
    return;
  }

  if(window._fbSave){
    var r = await window._fbSave(window.D);
    if(r.ok){
      localStorage.setItem("bbgh_cache", JSON.stringify(window.D));
      showToast("✅ Published! ("+dataSizeKB+"KB saved)","ok");
      if(window._setFbChip) window._setFbChip("g","✅ Saved!");
      setTimeout(function(){ if(window._setFbChip) window._setFbChip("g","✅ Connected"); },3000);
    } else {
      var errMsg = r.err||"";
      if(errMsg.includes("too_large") || errMsg.includes("length") || dataSizeKB > 900){
        showToast("❌ Data too large for Firebase ("+dataSizeKB+"KB). Images are being compressed — try re-uploading photos.","err");
      } else {
        showToast("❌ Failed: " + (errMsg||"Check Firebase rules"),"err");
      }
    }
  } else {
    localStorage.setItem("bbgh_cache", JSON.stringify(window.D));
    showToast("⚠️ Saved locally only. Firebase not connected.","info");
  }
  btn.disabled = false; btn.innerHTML = "☁️ Save &amp; Publish";
}

function showToast(msg, type){

// ── IMAGE PICKER ──
// ── IMAGE COMPRESSION ──
// Resizes any image to max 800px wide/tall at 82% quality before saving.
// This keeps Firebase data tiny (a phone photo goes from ~3MB → ~80KB).
function compressImage(dataURL, maxPx, quality, cb){
  var img = new Image();
  img.onload = function(){
    var w = img.width, h = img.height;
    if(w > maxPx || h > maxPx){
      if(w > h){ h = Math.round(h * maxPx / w); w = maxPx; }
      else      { w = Math.round(w * maxPx / h); h = maxPx; }
    }
    var canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL("image/jpeg", quality));
  };
  img.src = dataURL;
}

function pickImage(maxMB, cb){
  var inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*";
  inp.onchange = function(){
    var f = inp.files[0]; if(!f) return;
    if(f.size > maxMB*1024*1024){ showToast("Max "+maxMB+"MB","err"); return; }
    var r = new FileReader();
    r.onload = function(ev){
      // Compress to max 800px, 82% quality — keeps Firebase well under 1MB limit
      compressImage(ev.target.result, 800, 0.82, function(compressed){
        cb(compressed);
      });
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

// ── ESCAPE HTML ──
function h(str){
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// temporary subcats array for the "Add Category" form
window._newSubs = [];

function renderSubTags(containerId, catId){
  var c   = catId ? (window.D.categories||[]).find(function(x){return x.id===catId;}) : null;
  var arr = c ? (c.subcats||[]) : window._newSubs;
  var el  = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = "";
  arr.forEach(function(s, i){
    var tag = document.createElement("span");
    tag.style.cssText = "display:inline-flex;align-items:center;gap:5px;background:var(--pale);border:var(--border);border-radius:50px;padding:4px 10px;font-size:.78rem;color:var(--mid);margin:3px";
    tag.innerHTML = h(s) + '<button style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:.9rem;line-height:1;padding:0 2px" data-idx="'+i+'" data-catid="'+(catId||"")+'" data-cont="'+containerId+'" class="rm-sub-tag">&times;</button>';
    el.appendChild(tag);
  });
  // attach remove handlers
  el.querySelectorAll(".rm-sub-tag").forEach(function(btn){
    btn.addEventListener("click", function(){
      var idx   = parseInt(this.getAttribute("data-idx"));
      var cid   = parseInt(this.getAttribute("data-catid")) || 0;
      var cont  = this.getAttribute("data-cont");
      if(cid){
        var cat = (window.D.categories||[]).find(function(x){return x.id===cid;});
        if(cat){ cat.subcats.splice(idx,1); doPublish(); renderSubTags(cont, cid); showToast("Removed","info"); }
      } else {
        window._newSubs.splice(idx,1);
        renderSubTags(cont, 0);
      }
    });
  });
}

function addSubTag(inputId, containerId, catId){
  var inp = document.getElementById(inputId);
  var val = inp ? inp.value.trim() : "";
  if(!val){ showToast("⚠️ Type a sub-category name first","err"); return; }
  if(catId){
    var cat = (window.D.categories||[]).find(function(x){return x.id===catId;});
    if(!cat) return;
    cat.subcats = cat.subcats||[];
    if(cat.subcats.indexOf(val) !== -1){ showToast("Already exists","err"); return; }
    cat.subcats.push(val);
    doPublish(); renderSubTags(containerId, catId); showToast("✅ Sub-category added!","ok");
  } else {
    if(window._newSubs.indexOf(val) !== -1){ showToast("Already exists","err"); return; }
    window._newSubs.push(val);
    renderSubTags(containerId, 0);
  }
  inp.value = "";
}

    html += '<div style="font-size:.78rem;color:var(--green);font-weight:600">✅ QR code uploaded</div>';
    html += '<button class="btn-edit" id="changeQRBtn">📷 Change QR</button>';
    html += '<button class="btn-del" id="removeQRBtn">🗑️ Remove QR</button>';
    html += '</div>';
  } else {
    html += '<div style="width:100px;height:100px;border:2px dashed rgba(201,151,58,.4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2rem;background:var(--pale)">📱</div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px;justify-content:center">';
    html += '<div style="font-size:.78rem;color:var(--light)">No QR uploaded yet</div>';
    html += '<button class="btn-add" id="uploadQRBtn">📷 Upload QR Image</button>';
    html += '<div style="font-size:.72rem;color:var(--light)">Get your QR from GPay / PhonePe app</div>';
    html += '</div>';
  }
  html += '</div>';
  html += '<input type="file" id="upiQRFileInp" accept="image/*" style="display:none">';
  html += '<button class="btn-full" id="saveBizBtn">💾 Save Business Info &amp; Publish</button>';
  html += '</div></div>';

  html += '<div class="box"><div class="box-head"><div class="box-title">🔑 Change Admin Password</div></div><div class="box-body">';
  html += '<div class="f3">';
  html += '<div><label class="fl">Current Password</label><input class="fi" type="password" id="pwd-cur" placeholder="Current"></div>';
  html += '<div><label class="fl">New Password</label><input class="fi" type="password" id="pwd-new" placeholder="Min 6 characters"></div>';
  html += '<div><label class="fl">Confirm New</label><input class="fi" type="password" id="pwd-con" placeholder="Repeat new"></div>';
  html += '</div>';
  html += '<button class="btn-full" id="changePwdBtn">🔑 Update Password</button>';
  html += '</div></div>';

  el.innerHTML = html;

  document.getElementById("saveBizBtn").addEventListener("click", function(){
    var existing = window.D.business||{};
    window.D.business = {
      name:document.getElementById("b-name").value.trim(),
      tagline:document.getElementById("b-tag").value.trim(),
      wa:document.getElementById("b-wa").value.trim(),
      phone:document.getElementById("b-phone").value.trim(),
      city:document.getElementById("b-city").value.trim(),
      insta:document.getElementById("b-insta").value.trim(),
      waMsg:document.getElementById("b-wmsg").value.trim(),
      upiId:document.getElementById("b-upiid").value.trim(),
      upiQR:existing.upiQR||''
    };
    doPublish(); showToast("✅ Business info saved!","ok");
  });

  // QR upload handlers
  var qrInp = document.getElementById("upiQRFileInp");
  function handleQRUpload(){
    qrInp.click();
  }
  qrInp.addEventListener("change", function(){
    var f = this.files[0]; if(!f) return;
    if(f.size > 3*1024*1024){ showToast("⚠️ Max 3MB image","err"); return; }
    var reader = new FileReader();
    reader.onload = function(ev){
      window.D.business = window.D.business||{};
      window.D.business.upiQR = ev.target.result;
      doPublish(); pgBiz(); showToast("✅ UPI QR uploaded!","ok");
    };
    reader.readAsDataURL(f);
  });
  var uploadBtn  = document.getElementById("uploadQRBtn");
  var changeBtn  = document.getElementById("changeQRBtn");
  var removeBtn  = document.getElementById("removeQRBtn");
  if(uploadBtn) uploadBtn.addEventListener("click", handleQRUpload);
  if(changeBtn) changeBtn.addEventListener("click", handleQRUpload);
  if(removeBtn) removeBtn.addEventListener("click", function(){
    if(confirm("Remove UPI QR code?")){
      window.D.business = window.D.business||{};
      window.D.business.upiQR = '';
      doPublish(); pgBiz(); showToast("QR removed","info");
    }
  });

  document.getElementById("changePwdBtn").addEventListener("click", function(){
    var cur = document.getElementById("pwd-cur").value;
    var nw  = document.getElementById("pwd-new").value;
    var con = document.getElementById("pwd-con").value;
    if(cur!==ADMIN_PWD){ showToast("❌ Current password wrong","err"); return; }
    if(nw.length<6){ showToast("⚠️ Min 6 characters","err"); return; }
    if(nw!==con){ showToast("❌ Passwords don't match","err"); return; }
    ADMIN_PWD = nw;
    localStorage.setItem("bbgh_pwd", nw);
    showToast("✅ Password changed! Write it down.","ok");
    ["pwd-cur","pwd-new","pwd-con"].forEach(function(id){ document.getElementById(id).value=""; });
  });
}

// ══════════════════════════
// COLORS
// ══════════════════════════
function pgColors(){
  var el = document.getElementById("pageContent");
  window.D.design = window.D.design||{};
  var d = window.D.design;

  function cpRow(label, id, val, presets){
    var out = '<label class="fl">'+label+'</label><div class="color-row">';
    out += '<div class="swatch" style="background:'+val+'"><input type="color" id="'+id+'" value="'+val+'"></div>';
    out += '<div class="presets">';
    presets.forEach(function(c){
      out += '<div class="preset" data-for="'+id+'" data-color="'+c+'" style="background:'+c+'" title="'+c+'"></div>';
    });
    out += '</div></div>';
    return out;
  }

  var html = '<div class="alert alert-y">🎨 Pick colors for your website. Click Save after each section to apply.</div>';

  html += '<div class="box"><div class="box-head"><div class="box-title">🎨 Brand Colors</div></div><div class="box-body">';
  html += cpRow("Primary Color (backgrounds, nav)", "cp-pri", d.primaryColor||"#2d1a08", ["#2d1a08","#1a1a2e","#0d2137","#1a3d2e","#4a0010","#0f2d2d","#1c1c1c","#3d2b1f"]);
  html += cpRow("Secondary Color (buttons, accents)", "cp-sec", d.secondaryColor||"#c9973a", ["#c9973a","#e8b84b","#d4763b","#b5451b","#3b82f6","#16a34a","#9333ea","#dc2626"]);
  html += cpRow("Accent Color (badges, tags)", "cp-acc", d.accentColor||"#b5451b", ["#b5451b","#dc2626","#c9973a","#16a34a","#3b82f6","#9333ea","#0f172a","#374151"]);
  html += '<button class="btn-full" id="saveBrandBtn">💾 Save Brand Colors &amp; Publish</button>';
  html += '</div></div>';

  html += '<div class="box"><div class="box-head"><div class="box-title">🖼️ Page Background</div></div><div class="box-body">';
  html += cpRow("Background Color", "cp-bg", d.bgColor||"#fdf8f0", ["#fdf8f0","#fff9f5","#f0f4ff","#f0fff4","#fff0f0","#f5f5f5","#fffef9","#fef9ee"]);
  html += '<button class="btn-full" id="saveBgBtn">💾 Save Background &amp; Publish</button>';
  html += '</div></div>';

  html += '<div class="box"><div class="box-head"><div class="box-title">🦶 Footer Color</div></div><div class="box-body">';
  html += cpRow("Footer Background", "cp-foot", d.footerBg||"#1a1008", ["#1a1008","#0d0d0d","#1a1a2e","#1a3d2e","#4a0010","#0f2d2d","#2d1a08","#0c1a4a"]);
  html += '<button class="btn-full" id="saveFootBtn">💾 Save Footer Color &amp; Publish</button>';
  html += '</div></div>';

  el.innerHTML = html;

  // Preset dot clicks
  el.querySelectorAll(".preset").forEach(function(dot){
    dot.addEventListener("click", function(){
      var id  = this.getAttribute("data-for");
      var col = this.getAttribute("data-color");
      var inp = document.getElementById(id);
      if(inp){ inp.value=col; inp.closest(".swatch").style.background=col; }
    });
  });

  // Live preview on color change
  el.querySelectorAll(".swatch input[type=color]").forEach(function(inp){
    inp.addEventListener("input", function(){ this.closest(".swatch").style.background=this.value; });
  });

  document.getElementById("saveBrandBtn").addEventListener("click", function(){
    window.D.design.primaryColor   = document.getElementById("cp-pri").value;
    window.D.design.secondaryColor = document.getElementById("cp-sec").value;
    window.D.design.accentColor    = document.getElementById("cp-acc").value;
    doPublish(); showToast("✅ Brand colors saved!","ok");
  });
  document.getElementById("saveBgBtn").addEventListener("click", function(){
    window.D.design.bgColor = document.getElementById("cp-bg").value;
    doPublish(); showToast("✅ Background saved!","ok");
  });
  document.getElementById("saveFootBtn").addEventListener("click", function(){
    window.D.design.footerBg = document.getElementById("cp-foot").value;
    doPublish(); showToast("✅ Footer color saved!","ok");
  });
}

function pgFonts(){
  var el  = document.getElementById("pageContent");

  var fonts = [
    {name:"DM Sans + Playfair",val:"DM Sans",key:"DM Sans",desc:"Default — clean & elegant"},

    {name:"Raleway",val:"'Raleway',sans-serif",key:"Raleway",desc:"Stylish & elegant"}

  html += '</div></div></div>';
  el.innerHTML = html;

  el.querySelectorAll(".font-card").forEach(function(card){
    card.addEventListener("click", function(){
      window.D.design.fontFamily = this.getAttribute("data-val");

}

// FIX FIREBASE
// ══════════════════════════
function pgFixFb(){
  var el = document.getElementById("pageContent");
  var rules = '{\n  "rules": {\n    ".read": true,\n    ".write": true\n  }\n}';

  var html = '';
  html += '<div class="alert alert-g"><b>Firebase Project:</b> bluebirdsgifthouse-fcbef<br><b>Database:</b> <code>bluebirdsgifthouse-fcbef-default-rtdb.asia-southeast1.firebasedatabase.app</code></div>';

  html += '<div class="box"><div class="box-head"><div class="box-title">✅ Step 1 — Database Rules</div></div><div class="box-body">';
  html += '<div class="alert alert-y">Go to <b>console.firebase.google.com</b> &rarr; your project &rarr; Build &rarr; Realtime Database &rarr; <b>Rules</b> tab &rarr; delete everything &rarr; paste the text below &rarr; click <b>Publish</b> &rarr; click <b>"Publish anyway"</b> on the popup.</div>';
  html += '<div class="codebox"><pre>'+rules+'</pre><button class="copy-btn" id="copyRules">📋 Copy</button></div>';
  html += '<div class="alert alert-r">⚠️ A warning popup will appear — click <b>"Publish anyway"</b>. Do NOT click Dismiss!</div>';
  html += '</div></div>';

  html += '<div class="box"><div class="box-head"><div class="box-title">🔄 Step 2 — Test Connection</div></div><div class="box-body">';
  html += '<button class="btn-test" id="testFbBtn">🔄 Test Firebase Now</button>';
  html += '<div class="test-res" id="testRes"></div>';
  html += '</div></div>';

  html += '<div class="box"><div class="box-head"><div class="box-title">🔑 Step 3 — Authorized Domains</div></div><div class="box-body">';
  html += '<div class="alert alert-y">Go to Firebase Console &rarr; Authentication &rarr; Settings &rarr; <b>Authorized domains</b> &rarr; Add domain &rarr; type:<br>';
  html += '<code>bluebirdsgifthouse.github.io</code><br>Then click Add.</div>';
  html += '</div></div>';

  el.innerHTML = html;

  document.getElementById("copyRules").addEventListener("click", function(){
    navigator.clipboard.writeText(rules).then(function(){ showToast("📋 Rules copied!","ok"); });
  });

  document.getElementById("testFbBtn").addEventListener("click", async function(){
    var res = document.getElementById("testRes");
    res.className = "test-res show";
    res.style.cssText = "background:#fef9c3;border:1px solid #fde047;color:#854d0e;border-radius:11px;padding:13px;margin-top:11px;font-size:.87rem;font-weight:600;display:block";
    res.textContent = "⏳ Testing...";
    if(!window._fbTest){
      res.className = "test-res show fail";
      res.textContent = "❌ Firebase SDK still loading. Wait a moment and try again.";
      return;
    }
    var r = await window._fbTest();
    if(r.ok){
      res.className = "test-res show ok";
      res.innerHTML = "✅ <b>Firebase is working!</b> Click ☁️ Save &amp; Publish to sync your data.";
      if(window._setFbChip) window._setFbChip("g","✅ Connected");
    } else {
      res.className = "test-res show fail";
      var msg = r.err||"Unknown error";
      res.innerHTML = msg.includes("PERMISSION")
        ? "❌ <b>PERMISSION DENIED</b> — go to Step 1 and make sure you clicked <b>'Publish anyway'</b> on the Firebase popup."
        : "❌ Error: "+h(msg);
    }
  });
}
